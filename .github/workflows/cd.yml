name: CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]

# Roda após o CI (ci.yml) passar
jobs:
  build-and-deploy:
    name: "Build Docker + Deploy Fly.io"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: "📲 Checkout"
        uses: actions/checkout@v4

      - name: "🐳 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🔑 Login GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "📦 Build e push imagem multi-stage"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          # BuildKit cache: acelera builds incrementais (~50% no stage Rust)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "🔍 Lint Dockerfile (Hadolint)"
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: "🚀 Setup Fly CLI"
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: "🌎 Deploy no Fly.io (região GRU)"
        run: flyctl deploy --image ghcr.io/${{ github.repository }}:${{ github.sha }} --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # FLY_API_TOKEN deve ser adicionado em Settings > Secrets do repositório
        # Obter em: fly.io → Account → Access Tokens
